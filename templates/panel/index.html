<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/panel/css/base.css">
    <link rel="stylesheet" href="/static/panel/css/utils.css">
    <link rel="shortcut icon" href="https://api.hubbix.com.br/img/newFav.png" type="image/x-icon">
    <!-- END CSS -->

    <!-- TAG CODE -->
    {% if analytics %}{{ analytics|safe }}{% endif %}
    <!-- END TAG CODE -->

    <title>Hubbix Pannel</title>
</head>

<body data-bs-theme="dark">
    <img src="https://api.hubbix.com.br/img/logo.png" width="150" alt="logoHBX" class="logo">
    <div class="container py-5 d-flex justify-content-center align=items-center">
        <div class="card ">
            <div class="card-header">
                <span class="fs-5 fw-bold">
                    Seja bem vindo ao Hubbix Panel, faça login para continuar.
                </span>
            </div>
            <div class="card-body">
                <form class="d-flex flex-column gap-2" id="form-login">
                    <div class="form-floating">
                        <input class="form-control" type="text" placeholder="Email" id="email" autocomplete="email" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="form-floating">
                        <input class="form-control" type="password" placeholder="Senha" id="pwd" autocomplete="current-password" required>
                        <label for="pwd">Senha</label>
                    </div>
                    <a href="#" class="mt-2 text-primary">Esqueci minha senha</a>
                    <p>Caso não seja cadastrado, entre em contato com sua parceria!</p>
                    <button class="btn btn-lg btn-primary mt-2" type="submit">Logar</button>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init({ duration: 2000 }) </script>
    <script src="/static/panel/js/main.js"></script>
    <!-- END SCRIPTS -->
</body>

</html>
